<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>sweetsins.mp3</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            cursor: default;
        }

        .radio-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 20px;
        }

        .radio-image {
            max-width: 90%;
            max-height: 90vh;
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            filter: brightness(0.95);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
            pointer-events: auto;
            position: relative;
            z-index: 10;
        }

        .radio-image:hover {
            transform: scale(1.02);
            filter: brightness(1);
            box-shadow: 0 0 35px rgba(255, 255, 255, 0.15);
        }

        .radio-image:active {
            transform: scale(0.98);
        }

        .instruction {
            position: fixed;
            bottom: 25px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            letter-spacing: 2px;
            z-index: 100;
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            width: fit-content;
            margin: 0 auto;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            pointer-events: none;
            transition: opacity 0.5s ease;
            font-weight: 500;
        }

        @keyframes gentlePulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; text-shadow: 0 0 5px rgba(255,215,0,0.5); }
        }
        
        .instruction.pulse {
            animation: gentlePulse 1.2s ease-in-out infinite;
        }

        @media (max-width: 640px) {
            .radio-image {
                max-width: 95%;
            }
            .instruction {
                font-size: 11px;
                bottom: 15px;
                padding: 6px 12px;
            }
        }
    </style>
</head>
<body>

<div class="radio-container">
    <img class="radio-image" 
         id="radioImage"
         src="images/Radio.png" 
         alt="You did it and now you can't change anything..."
         title="Your sins cannot be washed away...">
</div>

<div class="instruction pulse" id="instruction">
    Enjoy your mistakes...
</div>

<script>
    (function() {
        // =============================================
        // 🎵 ПЛЕЙЛИСТ — ОДИН СЛУЧАЙНЫЙ ТРЕК ВЫБИРАЕТСЯ ПРИ ПЕРВОМ КЛИКЕ
        // =============================================
        const PLAYLIST = [
            'music/sweetdream.mp3',
            'music/track2.mp3',
            'music/track3.mp3',
            'music/track4.mp3',
            'music/track5.mp3'
        ];
        
        // Пути к картинкам
        const IMAGE_OFF = 'images/Radio.png';
        const IMAGE_ON  = 'images/Radio2.png';
        
        // =============================================
        
        const radioImg = document.getElementById('radioImage');
        const instructionDiv = document.getElementById('instruction');
        
        let isRadioOn = false;           // Включено ли радио (один раз)
        let selectedTrack = null;        // Выбранный случайный трек
        let audio = null;                // Аудио-объект
        
        // Функция выбора случайного трека из плейлиста
        function selectRandomTrack() {
            if (PLAYLIST.length === 0) {
                console.error('Плейлист пуст! Добавь треки в PLAYLIST');
                return null;
            }
            
            const randomIndex = Math.floor(Math.random() * PLAYLIST.length);
            const track = PLAYLIST[randomIndex];
            console.log(`🎲 Выбран случайный трек [${randomIndex + 1}/${PLAYLIST.length}]: ${track}`);
            return track;
        }
        
        // Включение радио (один раз)
        function turnRadioOn() {
            if (isRadioOn) return;
            
            // Выбираем случайный трек (один раз навсегда)
            selectedTrack = selectRandomTrack();
            if (!selectedTrack) {
                console.error('Не удалось выбрать трек из плейлиста');
                instructionDiv.innerHTML = 'ERRORE - NO TRACKS';
                instructionDiv.style.background = 'rgba(180,0,0,0.8)';
                return;
            }
            
            console.log(`🔊 Включаем радио с треком: ${selectedTrack} (будет играть вечно, нельзя сменить)`);
            
            // Меняем картинку на включенную
            setImageWithFallback(radioImg, IMAGE_ON, IMAGE_OFF, 'Радио включено');
            
            // Создаём аудио-объект
            audio = new Audio();
            audio.src = selectedTrack;
            audio.loop = true;           // 🔁 ЗАЦИКЛЕН — будет играть вечно одну и ту же песню
            audio.controls = false;      // Нет кнопок управления
            audio.volume = 0.50;
            audio.style.display = 'none';
            document.body.appendChild(audio);
            
            // Запускаем воспроизведение
            const playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    isRadioOn = true;
                    console.log('SOUL.RAR IS CORRUPTED! CONTACT YOUR ADMINISTRATOR TO FIX THE ERRORS.');
                    console.log(`🎵 Играет: ${selectedTrack} (зациклено, нельзя выключить или сменить)`);
                    
                    instructionDiv.classList.remove('pulse');
                    instructionDiv.innerHTML = 'What have you done?..';
                    instructionDiv.style.opacity = '0.7';
                    
                    setTimeout(() => {
                        if (isRadioOn) {
                            instructionDiv.style.opacity = '0.4';
                            instructionDiv.style.fontSize = '10px';
                        }
                    }, 3500);
                    
                }).catch(err => {
                    console.warn('ERRORE! YOU CAN\'T FIX ANYTHING.', err);
                    instructionDiv.innerHTML = 'ERRORE - CANNOT PLAY';
                    instructionDiv.style.background = 'rgba(180,0,0,0.8)';
                });
            }
            
            // Визуальный эффект при включении
            radioImg.style.transition = 'all 0.2s ease';
            radioImg.style.filter = 'brightness(1.05) drop-shadow(0 0 8px rgba(255,215,0,0.3))';
            setTimeout(() => {
                if (radioImg) radioImg.style.filter = '';
            }, 400);
        }
        
        function setImageWithFallback(imgElement, src, fallbackSrc, altText) {
            imgElement.src = src;
            imgElement.alt = altText;
            
            imgElement.onerror = function() {
                if (this.src !== fallbackSrc && fallbackSrc) {
                    console.warn(`Не удалось загрузить: ${src}, пробуем fallback`);
                    this.src = fallbackSrc;
                    this.onerror = null;
                } else {
                    console.error(`Ошибка: ни одно изображение не загрузилось. Проверьте пути: ${src} и ${fallbackSrc}`);
                    this.style.border = '2px solid #ff4444';
                }
            };
        }
        
        // Обработчик клика — включает радио один раз, дальше ничего не делает
        function onRadioClick(event) {
            event.stopPropagation();
            
            if (!isRadioOn) {
                turnRadioOn();   // Первый и единственный клик
            } else {
                // Радио уже играет — ничего не делаем, не меняем трек
                console.log('YOU CAN\'T FIX THIS. Radio is already playing.');
                // Небольшая визуальная обратная связь, что ничего не изменится
                radioImg.style.transform = 'scale(0.99)';
                setTimeout(() => {
                    if (radioImg) radioImg.style.transform = '';
                }, 150);
            }
        }
        
        // Обработчики клика
        radioImg.onclick = onRadioClick;
        radioImg.addEventListener('click', onRadioClick);
        
        // Обработка ошибки загрузки картинки
        radioImg.onerror = function() {
            console.error('ERRORE - CANT SEE YOUR FACE:', this.src);
            console.log('FIND Radio.png AND Radio2.png IN images/ FOLDER');
            this.alt = 'SINS';
            this.style.border = '1px solid #555';
        };
        
        // Предзагрузка картинок
        const preloadOff = new Image();
        preloadOff.src = IMAGE_OFF;
        const preloadOn = new Image();
        preloadOn.src = IMAGE_ON;
        
        console.log('YOUCANTFIXITYOUCANTFIXITYOUCANTFIXITYOUCANTFIXITYOUCANTFIXITYOUCANTFIXITYOUCANTFIXIT');
        console.log(`🎵 Плейлист содержит ${PLAYLIST.length} треков:`);
        PLAYLIST.forEach((track, i) => console.log(`   ${i + 1}. ${track}`));
        console.log('🔀 При клике РАЗ будет выбран СЛУЧАЙНЫЙ трек и зациклен навсегда');
        console.log('🔒 Выключить или сменить трек НЕЛЬЗЯ');
    })();
</script>

</body>
</html>

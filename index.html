<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>sweetsins.mp3</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            cursor: default;
        }

        .radio-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 20px;
        }

        .radio-image {
            max-width: 90%;
            max-height: 90vh;
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            filter: brightness(0.95);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
            pointer-events: auto;
            position: relative;
            z-index: 10;
        }

        .radio-image:hover {
            transform: scale(1.02);
            filter: brightness(1);
            box-shadow: 0 0 35px rgba(255, 255, 255, 0.15);
        }

        .radio-image:active {
            transform: scale(0.98);
        }

        .instruction {
            position: fixed;
            bottom: 25px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            letter-spacing: 2px;
            z-index: 100;
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            width: fit-content;
            margin: 0 auto;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            pointer-events: none;
            transition: opacity 0.5s ease;
            font-weight: 500;
        }

        @keyframes gentlePulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; text-shadow: 0 0 5px rgba(255,215,0,0.5); }
        }
        
        .instruction.pulse {
            animation: gentlePulse 1.2s ease-in-out infinite;
        }

        @media (max-width: 640px) {
            .radio-image {
                max-width: 95%;
            }
            .instruction {
                font-size: 11px;
                bottom: 15px;
                padding: 6px 12px;
            }
        }
    </style>
</head>
<body>

<div class="radio-container">
    <img class="radio-image" 
         id="radioImage"
         src="images/Radio.png" 
         alt="You did it and now you can't change anything..."
         title="Your sins cannot be washed away...">
</div>

<div class="instruction pulse" id="instruction">
    Enjoy your mistakes...
</div>

<script>
    (function() {
        // =============================================
        // 🎵 ПЛЕЙЛИСТ
        // =============================================
        const PLAYLIST = [
            'music/labi1.mp3',
            'music/labi2.mp3',
            'music/labi3.mp3',
            'music/labi4.mp3',
            'music/labi5.mp3'
        ];
        
        // Пути к картинкам
        const IMAGE_OFF = 'images/Radio.png';
        const IMAGE_ON  = 'images/Radio2.png';
        
        // =============================================
        
        const radioImg = document.getElementById('radioImage');
        const instructionDiv = document.getElementById('instruction');
        
        let isRadioOn = false;           // Включено ли радио
        let currentAudio = null;         // ТЕКУЩИЙ аудио-объект (только один!)
        
        // Функция выбора случайного трека
        function selectRandomTrack() {
            if (PLAYLIST.length === 0) {
                console.error('Плейлист пуст!');
                return null;
            }
            const randomIndex = Math.floor(Math.random() * PLAYLIST.length);
            const track = PLAYLIST[randomIndex];
            console.log(`🎲 Выбран трек: ${track}`);
            return track;
        }
        
        // ПОЛНАЯ ОСТАНОВКА любой играющей музыки
        function stopAllMusic() {
            if (currentAudio) {
                console.log('🔴 Останавливаем предыдущий трек');
                currentAudio.pause();
                currentAudio.src = '';     // Очищаем src, чтобы полностью освободить
                currentAudio = null;
            }
        }
        
        // Включение радио (один раз)
        function turnRadioOn() {
            if (isRadioOn) {
                console.log('Радио уже играет, повторный клик игнорируем');
                return;
            }
            
            // Выбираем случайный трек
            const selectedTrack = selectRandomTrack();
            if (!selectedTrack) {
                console.error('Не удалось выбрать трек');
                instructionDiv.innerHTML = 'ERRORE - NO TRACKS';
                instructionDiv.style.background = 'rgba(180,0,0,0.8)';
                return;
            }
            
            // ВАЖНО: останавливаем ВСЮ предыдущую музыку
            stopAllMusic();
            
            console.log(`🔊 Включаем радио: ${selectedTrack} (зациклено навсегда)`);
            
            // Меняем картинку
            setImageWithFallback(radioImg, IMAGE_ON, IMAGE_OFF, 'Радио включено');
            
            // Создаём НОВЫЙ аудио-объект
            const audio = new Audio();
            audio.src = selectedTrack;
            audio.loop = true;           // Зациклен
            audio.controls = false;
            audio.volume = 0.50;
            audio.style.display = 'none';
            document.body.appendChild(audio);
            
            // Сохраняем ссылку на текущий аудио-объект
            currentAudio = audio;
            
            // Запускаем
            const playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    isRadioOn = true;
                    console.log('✅ Музыка играет, других треков не будет');
                    
                    instructionDiv.classList.remove('pulse');
                    instructionDiv.innerHTML = 'What have you done?..';
                    instructionDiv.style.opacity = '0.7';
                    
                    setTimeout(() => {
                        if (isRadioOn) {
                            instructionDiv.style.opacity = '0.4';
                            instructionDiv.style.fontSize = '10px';
                        }
                    }, 3500);
                    
                }).catch(err => {
                    console.error('❌ Ошибка воспроизведения:', err);
                    instructionDiv.innerHTML = 'ERRORE - CANNOT PLAY';
                    instructionDiv.style.background = 'rgba(180,0,0,0.8)';
                    // Сбрасываем флаг, чтобы можно было попробовать снова
                    isRadioOn = false;
                    currentAudio = null;
                });
            }
            
            // Визуальный эффект
            radioImg.style.transition = 'all 0.2s ease';
            radioImg.style.filter = 'brightness(1.05) drop-shadow(0 0 8px rgba(255,215,0,0.3))';
            setTimeout(() => {
                if (radioImg) radioImg.style.filter = '';
            }, 400);
        }
        
        function setImageWithFallback(imgElement, src, fallbackSrc, altText) {
            imgElement.src = src;
            imgElement.alt = altText;
            
            imgElement.onerror = function() {
                if (this.src !== fallbackSrc && fallbackSrc) {
                    this.src = fallbackSrc;
                    this.onerror = null;
                } else {
                    console.error(`Ошибка загрузки: ${src}`);
                    this.style.border = '2px solid #ff4444';
                }
            };
        }
        
        // Обработчик клика — только один раз!
        function onRadioClick(event) {
            event.stopPropagation();
            
            if (!isRadioOn) {
                turnRadioOn();
            } else {
                // Уже играет — абсолютно ничего не делаем
                console.log('Radio already plays. One track only.');
            }
        }
        
        // Обработчики
        radioImg.onclick = onRadioClick;
        radioImg.addEventListener('click', onRadioClick);
        
        radioImg.onerror = function() {
            console.error('ERRORE:', this.src);
            console.log('Check images/ folder: Radio.png and Radio2.png');
        };
        
        // Предзагрузка картинок
        new Image().src = IMAGE_OFF;
        new Image().src = IMAGE_ON;
        
        console.log('='.repeat(50));
        console.log('🎵 ПЛЕЙЛИСТ:');
        PLAYLIST.forEach((t, i) => console.log(`   ${i+1}. ${t}`));
        console.log('🔀 При клике — РОВНО ОДИН случайный трек');
        console.log('🔁 Зациклен навсегда, нельзя выключить или сменить');
        console.log('='.repeat(50));
    })();
</script>

</body>
</html>

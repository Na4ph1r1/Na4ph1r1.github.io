<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>sweetsins.mp3</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* Убрал user-select: none - он иногда блокирует клики */
        }

        body {
            background-color: #000000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            cursor: default;
        }

        .radio-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 20px;
        }

        .radio-image {
            max-width: 90%;
            max-height: 90vh;
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            filter: brightness(0.95);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
            /* Гарантия что картинка кликабельна */
            pointer-events: auto;
            position: relative;
            z-index: 10;
        }

        .radio-image:hover {
            transform: scale(1.02);
            filter: brightness(1);
            box-shadow: 0 0 35px rgba(255, 255, 255, 0.15);
        }

        .radio-image:active {
            transform: scale(0.98);
        }

        .instruction {
            position: fixed;
            bottom: 25px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            letter-spacing: 2px;
            z-index: 100;
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            width: fit-content;
            margin: 0 auto;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            pointer-events: none;
            transition: opacity 0.5s ease;
            font-weight: 500;
        }

        @keyframes gentlePulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; text-shadow: 0 0 5px rgba(255,215,0,0.5); }
        }
        
        .instruction.pulse {
            animation: gentlePulse 1.2s ease-in-out infinite;
        }

        /* Добавил отладочную подсветку - убрать потом */
        /* .radio-image { border: 2px solid red; } */

        @media (max-width: 640px) {
            .radio-image {
                max-width: 95%;
            }
            .instruction {
                font-size: 11px;
                bottom: 15px;
                padding: 6px 12px;
            }
        }
    </style>
</head>
<body>

<div class="radio-container">
    <img class="radio-image" 
         id="radioImage"
         src="images/Radio.png" 
         alt="You did it and now you can't change anything..."
         title="Your sins cannot be washed away..."
         onclick="console.log('DEBUG: Клик по картинке сработал!')">
</div>

<div class="instruction pulse" id="instruction">
    Enjoy your mistakes...
</div>

<script>
    (function() {
        console.log('DEBUG: Скрипт загружен');
        
        const AUDIO_PATH = 'music/sweetdream.mp3';
        const IMAGE_OFF = 'images/Radio.png';
        const IMAGE_ON  = 'images/Radio2.png';
        
        const radioImg = document.getElementById('radioImage');
        const instructionDiv = document.getElementById('instruction');
        
        if (!radioImg) {
            console.error('DEBUG: Элемент radioImg НЕ НАЙДЕН!');
            return;
        }
        
        console.log('DEBUG: Элемент radioImg найден', radioImg);
        
        const audio = new Audio();
        audio.src = AUDIO_PATH;
        audio.loop = true;
        audio.controls = false;
        audio.autoplay = false;
        audio.preload = 'auto';
        audio.volume = 0.50;
        
        audio.style.display = 'none';
        document.body.appendChild(audio);
        
        let isRadioOn = false;
        let musicStarted = false;
        
        function setImageWithFallback(imgElement, src, fallbackSrc, altText) {
            imgElement.src = src;
            imgElement.alt = altText;
            
            imgElement.onerror = function() {
                if (this.src !== fallbackSrc && fallbackSrc) {
                    console.warn(`Не удалось загрузить: ${src}, пробуем fallback`);
                    this.src = fallbackSrc;
                    this.onerror = null;
                } else {
                    console.error(`Ошибка: ни одно изображение не загрузилось. Проверьте пути: ${src} и ${fallbackSrc}`);
                    this.style.border = '2px solid #ff4444';
                }
            };
        }
        
        function turnRadioOn() {
            console.log('DEBUG: turnRadioOn вызвана, isRadioOn =', isRadioOn);
            
            if (isRadioOn) return;
            
            console.log('DEBUG: Меняем картинку на включенную');
            setImageWithFallback(radioImg, IMAGE_ON, IMAGE_OFF, 'Радио включено');
            
            console.log('DEBUG: Пытаемся запустить музыку');
            const playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    musicStarted = true;
                    isRadioOn = true;
                    console.log('SOUL.RAR IS CORRUPTED! CONTACT YOUR ADMINISTRATOR TO FIX THE ERRORS.');
                    
                    instructionDiv.classList.remove('pulse');
                    instructionDiv.innerHTML = 'What have you done?..';
                    instructionDiv.style.opacity = '0.7';
    
                    setTimeout(() => {
                        if (isRadioOn) {
                            instructionDiv.style.opacity = '0.4';
                            instructionDiv.style.fontSize = '10px';
                        }
                    }, 3500);
                    
                }).catch(err => {
                    console.warn('ERRORE! YOU CAN\'T FIX ANYTHING.', err);
                    setTimeout(() => {
                        if (!musicStarted) {
                            audio.play().then(() => {
                                musicStarted = true;
                                isRadioOn = true;
                                console.log('REBOOT SINS.DATA');
                            }).catch(e => console.warn('ERRORE:', e));
                        }
                    }, 50);
                });
            }
            
            radioImg.style.transition = 'all 0.2s ease';
            radioImg.style.filter = 'brightness(1.05) drop-shadow(0 0 8px rgba(255,215,0,0.3))';
            setTimeout(() => {
                if (radioImg) radioImg.style.filter = '';
            }, 400);
        }
        
        function onRadioClick(event) {
            console.log('DEBUG: onRadioClick сработала! event:', event);
            event.stopPropagation();
            if (!isRadioOn) {
                turnRadioOn();
            } else {
                console.log('YOU CAN\'T FIX THIS.');
                radioImg.style.transform = 'scale(0.99)';
                setTimeout(() => {
                    if (radioImg) radioImg.style.transform = '';
                }, 150);
            }
        }
        
        // Добавляем обработчик ПРЯМО через атрибут (запасной вариант)
        radioImg.onclick = onRadioClick;
        
        // И через addEventListener (дублируем для надежности)
        radioImg.addEventListener('click', onRadioClick);
        
        console.log('DEBUG: Обработчики клика добавлены');
        
        radioImg.onerror = function() {
            console.error('ERRORE - CANT SEE YOUR FACE:', this.src);
            console.log('FIND Radio.png AND Radio2.png IN images/ FOLDER');
            this.alt = 'SINS';
            this.style.border = '1px solid #555';
        };
    
        audio.load();
        
        audio.addEventListener('canplaythrough', () => {
            console.log('GET READY TO SUFFER');
        });
        
        audio.addEventListener('error', (e) => {
            console.error('ERRORE with AUDIO:', AUDIO_PATH);
            console.error('FIND sweetdream.mp3 IN music/ FOLDER (MP3 FORMAT)');
            instructionDiv.innerHTML = 'ERRORE - MUSIC NOT FOUND';
            instructionDiv.style.background = 'rgba(180,0,0,0.8)';
            instructionDiv.style.animation = 'none';
        });
        
        const preloadOff = new Image();
        preloadOff.src = IMAGE_OFF;
        const preloadOn = new Image();
        preloadOn.src = IMAGE_ON;
        
        console.log('YOUCANTFIXITYOUCANTFIXITYOUCANTFIXITYOUCANTFIXITYOUCANTFIXITYOUCANTFIXITYOUCANTFIXIT');
        console.log('DEBUG: Скрипт полностью загружен, жду клика по картинке');
    })();
</script>

</body>
</html>
